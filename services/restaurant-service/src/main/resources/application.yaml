server:
  port: ${SERVER_PORT:8102}
spring:
  application:
    name: restaurant-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/restaurant_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  servlet:
    multipart:
      max-file-size: ${STORAGE_MAX_FILE_SIZE:10485760}
      max-request-size: ${STORAGE_MAX_FILE_SIZE:10485760}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/food-delivery}
security:
  jwt:
    audience: ${KEYCLOAK_AUDIENCE:food-delivery-api}
clients:
  user-service:
    base-url: ${USER_SERVICE_URL:http://localhost:8101}
app:
  storage:
    provider: ${STORAGE_PROVIDER:CLOUDINARY}
    max-file-size: ${STORAGE_MAX_FILE_SIZE:10485760}
    allowed-content-types:
      - image/jpeg
      - image/png
      - application/pdf
    cloudinary:
      cloud-name: ${CLOUDINARY_CLOUD_NAME:}
      api-key: ${CLOUDINARY_API_KEY:}
      api-secret: ${CLOUDINARY_API_SECRET:}
      base-folder: ${CLOUDINARY_BASE_FOLDER:food-delivery/restaurant-documents}
    s3:
      bucket: ${S3_BUCKET:}
      region: ${S3_REGION:}
      endpoint: ${S3_ENDPOINT:}
      access-key: ${S3_ACCESS_KEY:}
      secret-key: ${S3_SECRET_KEY:}
      path-style-access: ${S3_PATH_STYLE_ACCESS:false}
      base-folder: ${S3_BASE_FOLDER:restaurant-documents}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: false
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${server.port}
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
